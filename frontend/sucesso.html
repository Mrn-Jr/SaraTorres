<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Confirmado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    </head>
<body class="bg-black flex justify-center items-center h-screen p-4">
    
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-8 w-full max-w-md shadow-2xl text-center transform transition-all duration-1000 translate-y-0 opacity-100">
        
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-900/30 text-green-500 mb-6 border border-green-900/50">
            <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        
        <h2 class="text-3xl font-black text-yellow-500 tracking-wide mb-3">Agendado com Sucesso!</h2>
        <p class="text-zinc-300 text-base mb-8">O seu horário foi reservado na nossa agenda.</p>
        
        <div class="bg-black border border-zinc-800 rounded-lg p-5 mb-6 text-left">
            <p class="text-zinc-400 text-sm leading-relaxed">
                <span class="text-yellow-500 font-bold block mb-2">Precisa cancelar ou alterar?</span>
                Caso ocorra algum imprevisto, por favor, avise a profissional através do contato direto (via WhatsApp) com a maior antecedência possível.
            </p>
        </div>

        <a href="index.html" class="block w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md text-center mt-2">
            Fazer Novo Agendamento
        </a>
    </div>

</body>
</html>
