<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão - Estética</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fundo a simular a textura de mármore escuro com veios dourados da imagem aprovada */
        body {
            background-color: #09090b;
            background-image: radial-gradient(circle at 15% 50%, rgba(202, 138, 4, 0.05), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(202, 138, 4, 0.05), transparent 25%);
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen p-4 md:p-8 font-sans">
    
    <div class="max-w-xl mx-auto space-y-6">
        
        <!-- Cabeçalho Principal -->
        <header class="bg-zinc-950/80 border border-zinc-800 rounded-xl p-5 flex justify-between items-center shadow-lg backdrop-blur-sm">
            <h1 class="text-2xl font-black text-yellow-500 tracking-wide drop-shadow-md">Painel de Gestão</h1>
            <button class="text-zinc-400 hover:text-white text-sm font-medium transition-colors">Sair</button>
        </header>

        <!-- Separador Agenda de Hoje -->
        <div class="inline-block bg-zinc-950/80 border border-zinc-800 rounded-lg px-6 py-3 shadow-lg">
            <h2 class="text-lg font-bold text-white">Agenda de Hoje</h2>
        </div>

        <!-- Lista de Agendamentos (Onde a mágica acontece!) -->
        <div id="lista-agendamentos" class="space-y-4">
            <!-- Texto de carregamento enquanto o Python processa -->
            <p class="text-zinc-500 animate-pulse bg-zinc-900/90 border border-zinc-800 rounded-xl p-5">A carregar a sua agenda do banco de dados...</p>
        </div>

        <!-- Secção: Bloquear Horário (Requisito da Administradora) -->
        <div class="bg-zinc-900/90 border border-zinc-800 rounded-xl p-5 shadow-md mt-8">
            <h2 class="text-xl font-bold text-yellow-500 mb-1">Bloquear Horário</h2>
            <p class="text-zinc-400 text-sm mb-4">Adicione bloqueios manuais para imprevistos ou pausas.</p>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-zinc-300 text-xs mb-1">Início</label>
                    <input type="time" class="w-full bg-black border border-zinc-800 rounded-lg p-2.5 text-zinc-300 focus:outline-none focus:border-yellow-600">
                </div>
                <div>
                    <label class="block text-zinc-300 text-xs mb-1">Fim</label>
                    <input type="time" class="w-full bg-black border border-zinc-800 rounded-lg p-2.5 text-zinc-300 focus:outline-none focus:border-yellow-600">
                </div>
            </div>
            
            <button class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 rounded-lg transition-colors shadow-md">
                Aplicar Bloqueio
            </button>
        </div>

        <!-- Secção: Serviços -->
        <div class="bg-zinc-900/90 border border-zinc-800 rounded-xl p-5 shadow-md flex justify-between items-center">
            <h2 class="text-xl font-bold text-white">Serviços</h2>
            <button class="text-yellow-500 font-semibold hover:text-yellow-400">+ Novo</button>
        </div>

    </div>

    <!-- O Cérebro da Interface: JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lista = document.getElementById('lista-agendamentos');
            
            fetch('http://127.0.0.1:5000/api/admin/agendamentos')
                .then(response => response.json())
                .then(data => {
                    lista.innerHTML = ''; 

                    if (data.agendamentos.length === 0) {
                        lista.innerHTML = `
                            <div class="bg-zinc-900/90 border border-zinc-800 rounded-xl p-5 shadow-md text-center">
                                <p class="text-zinc-400 italic">A sua agenda está livre neste momento.</p>
                            </div>`;
                        return;
                    }
                    
                    data.agendamentos.forEach(agendamento => {
                        const horaInicioObj = new Date(agendamento.data_hora_inicio);
                        const horaFimObj = new Date(agendamento.data_hora_fim);
                        const horaInicio = horaInicioObj.toLocaleTimeString('pt-PT', {hour: '2-digit', minute:'2-digit'});
                        const horaFim = horaFimObj.toLocaleTimeString('pt-PT', {hour: '2-digit', minute:'2-digit'});
                        const dataFormatada = horaInicioObj.toLocaleDateString('pt-PT');

                        let corStatus = agendamento.status === 'confirmado' ? 'text-yellow-500' : 'text-zinc-500';

                        // --- NOVA LÓGICA DE TRATAMENTO DE WHATSAPP ---
                        // 1. Pega o número e retira tudo o que não for número (Remove parênteses, traços, espaços)
                        let numeroLimpo = agendamento.telefone_whatsapp.replace(/\D/g, '');
                        
                        // 2. Adiciona o código do país automaticamente se a cliente não tiver colocado
                        if (numeroLimpo.length === 10 || numeroLimpo.length === 11) {
                            // Se tiver 10 ou 11 dígitos (Padrão Brasil DDD + Número), adiciona o 55
                            numeroLimpo = '55' + numeroLimpo;
                        } else if (numeroLimpo.length === 9) {
                            // Se tiver 9 dígitos (Padrão Portugal), adiciona o 351
                            numeroLimpo = '351' + numeroLimpo;
                        }
                        // ----------------------------------------------

                        lista.innerHTML += `
                            <div class="bg-zinc-900/90 border border-zinc-800 rounded-xl p-5 shadow-md">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="text-xl font-bold text-white tracking-wide">${horaInicio} - ${horaFim}</h3>
                                    <span class="${corStatus} text-sm font-semibold capitalize">${agendamento.status}</span>
                                </div>
                                <p class="text-zinc-300">Cliente: <span class="text-white font-medium">${agendamento.nome}</span></p>
                                <p class="text-zinc-500 text-sm mt-0.5">
                                    Serviço: ${agendamento.nome_servico} | 
                                    Data: ${dataFormatada}
                                </p>
                                <div class="mt-3 pt-3 border-t border-zinc-800/50">
                                    <a href="https://wa.me/${numeroLimpo}" target="_blank" class="text-sm font-medium text-green-500 hover:text-green-400 transition-colors">
                                        Falar no WhatsApp
                                    </a>
                                </div>
                            </div>
                        `;
                    });
                })
                .catch(err => {
                    console.error("Erro:", err);
                    lista.innerHTML = `
                        <div class="bg-red-950/50 border border-red-900 rounded-xl p-5 shadow-md text-center">
                            <p class="text-red-400">Erro ao carregar a agenda. Verifique se o backend Python está a rodar.</p>
                        </div>`;
                });
        });
    </script>
</body>
</html>
