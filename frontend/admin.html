<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão - Estética</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #09090b;
            background-image: radial-gradient(circle at 15% 50%, rgba(202, 138, 4, 0.05), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(202, 138, 4, 0.05), transparent 25%);
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen p-4 md:p-8 font-sans">
    
    <div class="max-w-xl mx-auto space-y-6">
        <header class="bg-zinc-950/80 border border-zinc-800 rounded-xl p-5 flex justify-between items-center shadow-lg backdrop-blur-sm">
            <h1 class="text-2xl font-black text-yellow-500 tracking-wide drop-shadow-md">Painel de Gestão</h1>
            <button class="text-zinc-400 hover:text-white text-sm font-medium transition-colors">Sair</button>
        </header>

        <!-- Agenda -->
        <div class="inline-block bg-zinc-950/80 border border-zinc-800 rounded-lg px-6 py-3 shadow-lg">
            <h2 class="text-lg font-bold text-white">Agenda de Hoje</h2>
        </div>
        <div id="lista-agendamentos" class="space-y-4"></div>

        <!-- Bloquear Horário Manual -->
        <div class="bg-zinc-900/90 border border-zinc-800 rounded-xl p-5 shadow-md mt-8">
            <h2 class="text-xl font-bold text-yellow-500 mb-1">Bloquear Horário (Imprevistos)</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4 mt-4">
                <div>
                    <label class="block text-zinc-300 text-xs mb-1">Data</label>
                    <input type="date" id="data_bloqueio" class="w-full bg-black border border-zinc-800 rounded-lg p-2.5 text-zinc-300 focus:outline-none focus:border-yellow-600">
                </div>
                <div>
                    <label class="block text-zinc-300 text-xs mb-1">Início</label>
                    <input type="time" id="inicio_bloqueio" class="w-full bg-black border border-zinc-800 rounded-lg p-2.5 text-zinc-300 focus:outline-none focus:border-yellow-600">
                </div>
                <div>
                    <label class="block text-zinc-300 text-xs mb-1">Fim</label>
                    <input type="time" id="fim_bloqueio" class="w-full bg-black border border-zinc-800 rounded-lg p-2.5 text-zinc-300 focus:outline-none focus:border-yellow-600">
                </div>
            </div>
            <button id="btn_bloquear" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 rounded-lg transition-colors shadow-md">Aplicar Bloqueio</button>
        </div>

        <!-- NOVO: Configurações de Expediente e Almoço -->
        <div class="bg-zinc-900/90 border border-zinc-800 rounded-xl p-5 shadow-md mt-8">
            <h2 class="text-xl font-bold text-yellow-500 mb-1">Configurar Horário Padrão</h2>
            <p class="text-zinc-400 text-sm mb-4">Ajuste os dias, a sua hora de abertura, fecho e as suas pausas de almoço.</p>
            
            <div class="bg-black p-4 rounded-lg border border-zinc-800 mb-4">
                <h3 class="text-zinc-300 font-semibold mb-3">Dias de Atendimento</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-zinc-300 text-sm">
                    <label class="flex items-center space-x-2"><input type="checkbox" name="dias" value="1" class="form-checkbox text-yellow-500 rounded bg-zinc-800 border-zinc-700" checked> <span>Segunda</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" name="dias" value="2" class="form-checkbox text-yellow-500 rounded bg-zinc-800 border-zinc-700" checked> <span>Terça</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" name="dias" value="3" class="form-checkbox text-yellow-500 rounded bg-zinc-800 border-zinc-700" checked> <span>Quarta</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" name="dias" value="4" class="form-checkbox text-yellow-500 rounded bg-zinc-800 border-zinc-700" checked> <span>Quinta</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" name="dias" value="5" class="form-checkbox text-yellow-500 rounded bg-zinc-800 border-zinc-700" checked> <span>Sexta</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" name="dias" value="6" class="form-checkbox text-yellow-500 rounded bg-zinc-800 border-zinc-700"> <span>Sábado</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" name="dias" value="0" class="form-checkbox text-yellow-500 rounded bg-zinc-800 border-zinc-700"> <span>Domingo</span></label>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="bg-black p-4 rounded-lg border border-zinc-800">
                    <h3 class="text-zinc-300 font-semibold mb-3">Expediente (Trabalho)</h3>
                    <div class="flex gap-2">
                        <div class="w-1/2">
                            <label class="block text-zinc-500 text-xs mb-1">Abertura</label>
                            <input type="time" id="config_abertura" value="09:00" class="w-full bg-zinc-900 border border-zinc-700 rounded p-2 text-zinc-200 focus:outline-none focus:border-yellow-600">
                        </div>
                        <div class="w-1/2">
                            <label class="block text-zinc-500 text-xs mb-1">Fecho</label>
                            <input type="time" id="config_fecho" value="18:00" class="w-full bg-zinc-900 border border-zinc-700 rounded p-2 text-zinc-200 focus:outline-none focus:border-yellow-600">
                        </div>
                    </div>
                </div>

                <div class="bg-black p-4 rounded-lg border border-zinc-800">
                    <h3 class="text-zinc-300 font-semibold mb-3">Pausa (Almoço)</h3>
                    <div class="flex gap-2">
                        <div class="w-1/2">
                            <label class="block text-zinc-500 text-xs mb-1">Início</label>
                            <input type="time" id="config_almoco_inicio" value="13:00" class="w-full bg-zinc-900 border border-zinc-700 rounded p-2 text-zinc-200 focus:outline-none focus:border-yellow-600">
                        </div>
                        <div class="w-1/2">
                            <label class="block text-zinc-500 text-xs mb-1">Fim</label>
                            <input type="time" id="config_almoco_fim" value="14:00" class="w-full bg-zinc-900 border border-zinc-700 rounded p-2 text-zinc-200 focus:outline-none focus:border-yellow-600">
                        </div>
                    </div>
                </div>
            </div>
            
            <button onclick="salvarConfiguracoes()" class="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3 rounded-lg transition-colors border border-zinc-700 shadow-md">
                Salvar Horários e Dias
            </button>
        </div>

        <!-- Gestão de Serviços -->
        <div class="bg-zinc-900/90 border border-zinc-800 rounded-xl p-5 shadow-md flex justify-between items-center mt-8">
            <h2 class="text-xl font-bold text-white">Serviços</h2>
            <button onclick="abrirModalServico()" class="text-yellow-500 font-semibold hover:text-yellow-400">+ Novo</button>
        </div>
        <div id="lista-servicos" class="space-y-3 mb-10"></div>
    </div>

    <!-- Modal de Serviço (Escondido) -->
    <div id="modal-servico" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex justify-center items-center z-50">
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 w-11/12 max-w-md shadow-2xl">
            <h2 id="modal-titulo" class="text-xl font-bold text-yellow-500 mb-4">Novo Serviço</h2>
            <input type="hidden" id="servico_id">
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-zinc-300 text-xs mb-1">Nome do Serviço</label>
                    <input type="text" id="servico_nome" class="w-full bg-black border border-zinc-800 rounded-lg p-2.5 text-zinc-300 focus:outline-none focus:border-yellow-600">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-zinc-300 text-xs mb-1">Duração (minutos)</label>
                        <input type="number" id="servico_duracao" class="w-full bg-black border border-zinc-800 rounded-lg p-2.5 text-zinc-300 focus:outline-none focus:border-yellow-600">
                    </div>
                    <div>
                        <label class="block text-zinc-300 text-xs mb-1">Preço (R$)</label>
                        <input type="number" step="0.5" id="servico_preco" class="w-full bg-black border border-zinc-800 rounded-lg p-2.5 text-zinc-300 focus:outline-none focus:border-yellow-600">
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="fecharModalServico()" class="text-zinc-400 hover:text-white px-4 py-2 font-medium">Cancelar</button>
                <button id="btn_salvar_servico" class="bg-yellow-600 hover:bg-yellow-500 text-white font-bold px-6 py-2 rounded-lg transition-colors shadow-md">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            carregarAgenda();
            carregarServicos();
            carregarConfiguracoes(); // Carrega os horários salvos ao abrir o painel

            // Bloquear Horário Manual
            document.getElementById('btn_bloquear').addEventListener('click', () => {
                const dataVal = document.getElementById('data_bloqueio').value;
                const inicioVal = document.getElementById('inicio_bloqueio').value;
                const fimVal = document.getElementById('fim_bloqueio').value;
                if(!dataVal || !inicioVal || !fimVal) return alert('Preencha todos os campos do bloqueio.');

                fetch('http://127.0.0.1:5000/api/admin/bloquear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: dataVal, hora_inicio: inicioVal, hora_fim: fimVal })
                }).then(() => window.location.reload());
            });

            // Salvar Serviço
            document.getElementById('btn_salvar_servico').addEventListener('click', () => {
                const id = document.getElementById('servico_id').value;
                const nome = document.getElementById('servico_nome').value;
                const duracao = document.getElementById('servico_duracao').value;
                const preco = document.getElementById('servico_preco').value;

                if(!nome || !duracao || !preco) return alert('Preencha todos os campos do serviço.');

                const url = id ? `http://127.0.0.1:5000/api/admin/servicos/${id}` : 'http://127.0.0.1:5000/api/admin/servicos';
                const method = id ? 'PUT' : 'POST';

                fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, duracao: parseInt(duracao), preco: parseFloat(preco) })
                }).then(() => {
                    fecharModalServico();
                    carregarServicos();
                });
            });
        });

        // NOVO: Funções de Configuração de Horários
        function carregarConfiguracoes() {
            fetch('http://127.0.0.1:5000/api/admin/disponibilidade')
                .then(r => r.json())
                .then(data => {
                    data.regras.forEach(regra => {
                        if(regra.tipo_regra === 'trabalho') {
                            document.getElementById('config_abertura').value = regra.hora_inicio;
                            document.getElementById('config_fecho').value = regra.hora_fim;
                        } else if (regra.tipo_regra === 'bloqueio') {
                            document.getElementById('config_almoco_inicio').value = regra.hora_inicio;
                            document.getElementById('config_almoco_fim').value = regra.hora_fim;
                        }
                    });
                });
        }

        function salvarConfiguracoes() {
            // 1. Captura os dias marcados no HTML (retorna uma lista de números)
            const checkboxes = document.querySelectorAll('input[name="dias"]:checked');
            const diasSelecionados = Array.from(checkboxes).map(cb => parseInt(cb.value));

            // 2. Validação: Impede de salvar se a profissional esquecer de marcar os dias
            if (diasSelecionados.length === 0) {
                alert("Por favor, selecione pelo menos um dia da semana para trabalhar.");
                return;
            }

            // 3. Monta o pacote de dados (payload) alinhado com o que o Python espera
            const payload = {
                dias_semana: diasSelecionados, // NOVO: Envia a lista de dias (ex: [1, 2, 3])
                hora_abertura: document.getElementById('config_abertura').value,
                hora_fecho: document.getElementById('config_fecho').value,
                almoco_inicio: document.getElementById('config_almoco_inicio').value,
                almoco_fim: document.getElementById('config_almoco_fim').value
            };

            // 4. Envia os dados para a API (com a rota correta do admin)
            fetch('http://127.0.0.1:5000/api/admin/disponibilidade', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                alert(data.mensagem); // Mostra o aviso de sucesso!
            })
            .catch(err => {
                console.error("Erro ao salvar:", err);
                alert("Ocorreu um erro ao salvar as configurações.");
            });
        }

 function carregarAgenda() {
            fetch('http://127.0.0.1:5000/api/admin/agendamentos')
                .then(r => r.json())
                .then(data => {
                    const lista = document.getElementById('lista-agendamentos');
                    lista.innerHTML = ''; 
                    if (data.agendamentos.length === 0) {
                        lista.innerHTML = `<div class="bg-zinc-900/90 border border-zinc-800 rounded-xl p-5 text-center"><p class="text-zinc-400 italic">Agenda livre.</p></div>`;
                        return;
                    }
                    data.agendamentos.forEach(ag => {
                        const hInicio = new Date(ag.data_hora_inicio).toLocaleTimeString('pt-PT', {hour: '2-digit', minute:'2-digit'});
                        const hFim = new Date(ag.data_hora_fim).toLocaleTimeString('pt-PT', {hour: '2-digit', minute:'2-digit'});
                        const dt = new Date(ag.data_hora_inicio).toLocaleDateString('pt-PT');
                        const corStatus = ag.status === 'confirmado' ? 'text-yellow-500' : (ag.status === 'bloqueado' ? 'text-red-500' : 'text-zinc-500');

                        // Organiza o rodapé do cartão (WhatsApp de um lado, Excluir do outro)
                        let rodapeHtml = `<div class="mt-4 pt-3 border-t border-zinc-800/50 flex justify-between items-center">`;
                        
                        if (ag.telefone_whatsapp) {
                            let num = ag.telefone_whatsapp.replace(/\D/g, '');
                            if (num.length >= 10) num = '55' + num; else if (num.length === 9) num = '351' + num;
                            rodapeHtml += `<a href="https://wa.me/${num}" target="_blank" class="text-sm font-medium text-green-500 hover:text-green-400">Falar no WhatsApp</a>`;
                        } else {
                            rodapeHtml += `<span></span>`; // Espaço vazio para manter o botão excluir à direita caso seja um bloqueio
                        }

                        // Adiciona o botão de excluir
                        rodapeHtml += `<button onclick="excluirAgendamento(${ag.id_agendamento})" class="text-red-500 hover:text-red-400 text-sm font-medium transition-colors">Excluir</button></div>`;

                        lista.innerHTML += `
                            <div class="bg-zinc-900/90 border border-zinc-800 rounded-xl p-5 shadow-md">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="text-xl font-bold text-white">${hInicio} - ${hFim}</h3>
                                    <span class="${corStatus} text-sm font-semibold capitalize">${ag.status}</span>
                                </div>
                                <p class="text-zinc-300">Cliente/Evento: <span class="text-white font-medium">${ag.nome}</span></p>
                                <p class="text-zinc-500 text-sm mt-0.5">${ag.nome_servico} | Data: ${dt}</p>
                                ${rodapeHtml}
                            </div>`;
                    });
                });
        }

        function excluirAgendamento(id) {
            if(confirm("Tem certeza que deseja apagar este registo da agenda? O horário voltará a ficar livre para marcações.")) {
                fetch(`http://127.0.0.1:5000/api/admin/agendamentos/${id}`, { 
                    method: 'DELETE' 
                })
                .then(r => r.json())
                .then(data => { 
                    alert(data.mensagem); 
                    carregarAgenda(); // Atualiza a agenda instantaneamente
                })
                .catch(err => console.error("Erro ao excluir:", err));
            }
        }

        function carregarServicos() {
            fetch('http://127.0.0.1:5000/api/servicos')
                .then(r => r.json())
                .then(data => {
                    const lista = document.getElementById('lista-servicos');
                    lista.innerHTML = '';
                    data.servicos.forEach(s => {
                        lista.innerHTML += `
                            <div class="bg-zinc-900/90 border border-zinc-800 rounded-xl p-5 shadow-md flex justify-between items-center">
                                <div>
                                    <h3 class="text-lg font-bold text-white">${s.nome_servico}</h3>
                                    <p class="text-zinc-500 text-sm mt-0.5">${s.duracao_minutos} min &bull; R$${s.preco}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="abrirModalServico(${s.id_servico}, '${s.nome_servico}', ${s.duracao_minutos}, ${s.preco})" class="border border-zinc-700 text-zinc-300 px-4 py-1.5 rounded-lg text-sm hover:bg-zinc-800 transition-colors">
                                        Editar
                                    </button>
                                    <button onclick="excluirServico(${s.id_servico})" class="border border-red-900 text-red-500 px-4 py-1.5 rounded-lg text-sm hover:bg-red-950 transition-colors">
                                        Excluir
                                    </button>
                                </div>
                            </div>`;
                    });
                });
        }

        function excluirServico(id) {
            if(confirm("Tem certeza que deseja excluir este serviço do seu catálogo?")) {
                fetch(`http://127.0.0.1:5000/api/admin/servicos/${id}`, { method: 'DELETE' })
                .then(r => r.json())
                .then(data => { alert(data.mensagem); carregarServicos(); })
            }
        }

        function abrirModalServico(id = '', nome = '', duracao = '', preco = '') {
            document.getElementById('modal-titulo').innerText = id ? 'Editar Serviço' : 'Novo Serviço';
            document.getElementById('servico_id').value = id;
            document.getElementById('servico_nome').value = nome;
            document.getElementById('servico_duracao').value = duracao;
            document.getElementById('servico_preco').value = preco;
            document.getElementById('modal-servico').classList.remove('hidden');
        }

        function fecharModalServico() {
            document.getElementById('modal-servico').classList.add('hidden');
        }
    </script>
</body>
</html>
